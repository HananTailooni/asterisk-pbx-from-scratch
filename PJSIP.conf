;; Carrier : Telnyx SIP Trunk
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Carrier : Telnyx SIP Trunk
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;


[Carrier-Telnyx]
type=endpoint
transport=transport-udp
context=from-telnyx
aors=Carrier-Telnyx-AOR
identify_by=ip
disallow=all
allow=ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes


[Carrier-Telnyx-AOR]
type=aor
contact=sip:sip.telnyx.com:5060
qualify_frequency=60

[Carrier-Telnyx-Identify]
type=identify
endpoint=Carrier-Telnyx
match=sip.telnyx.com
match=
match=

