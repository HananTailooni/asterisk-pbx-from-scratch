[internal]
exten => 1000,1,Dial(PJSIP/phone-1000)
exten => 2000,1,Dial(PJSIP/phone-2000)

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Inbound PSTN Calls from Telnyx
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[from-telnyx]
exten => _X.,1,NoOp(===== Incoming Call From Telnyx =====)
 same => n,NoOp(CallerID: ${CALLERID(num)})
 same => n,NoOp(Dialed Number: ${EXTEN})
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()


